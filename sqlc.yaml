version: "2"
sql:
  - schema: "internal/platform/db/migrations/"
    queries: "internal/platform/db/queries/"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/platform/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - column: "*.tenant_id"
            go_type: "string"
          - column: "*.id"
            go_type: "string"
          - column: "*.user_id"
            go_type: "string"
          - column: "*.account_id"
            go_type: "string"
          - column: "*.category_id"
            go_type: "string"
          - column: "*.transaction_id"
            go_type: "string"
          - column: "*.parent_id"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Text"
          - column: "*.actor_id"
            go_type: "string"
