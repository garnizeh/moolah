services:
  postgres:
    image: postgres:17-alpine
    container_name: moolah-db
    environment:
      POSTGRES_USER: moolah
      POSTGRES_PASSWORD: password
      POSTGRES_DB: moolah
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: moolah-cache
    ports:
      - "6379:6379"

volumes:
  postgres_data:
