services:
  postgres:
    image: postgres:17-alpine
    container_name: moolah-postgres
    restart: always
    environment:
      POSTGRES_USER: moolah
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: moolah_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U moolah -d moolah_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moolah-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: moolah-mailhog
    restart: always
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # HTTP UI port

volumes:
  postgres_data:
  redis_data:
