name: CI

on:
  push:
    branches: [ main, "task/**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run unit tests
        run: go test -v -race -cover ./...

      - name: Build API
        run: go build -v -o bin/api ./cmd/api
