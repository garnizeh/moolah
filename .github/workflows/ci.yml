name: CI Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  TAILWIND_VERSION: "4.1.8"
  TEMPL_VERSION: "v0.3.1001"

jobs:
  # ─── Stage 1: Static Analysis ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: --timeout=5m

      - name: Check sqlc generation is up to date
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          sqlc generate
          git diff --exit-code internal/platform/db/sqlc/

      - name: Install templ CLI
        run: go install github.com/a-h/templ/cmd/templ@${{ env.TEMPL_VERSION }}

      - name: Install Tailwind CSS CLI
        run: |
          curl -fsSL "https://github.com/tailwindlabs/tailwindcss/releases/download/v${{ env.TAILWIND_VERSION }}/tailwindcss-linux-x64" -o tailwindcss
          curl -fsSL "https://github.com/tailwindlabs/tailwindcss/releases/download/v${{ env.TAILWIND_VERSION }}/sha256sums.txt" -o sha256sums.txt
          grep "tailwindcss-linux-x64" sha256sums.txt | sha256sum -c -
          sudo mv tailwindcss /usr/local/bin/tailwindcss
          chmod +x /usr/local/bin/tailwindcss

      - name: Check templ generation is up to date
        run: |
          templ generate ./...
          git diff --exit-code internal/ui/

  # ─── Stage 2: Security Scanning ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7
          "$(go env GOPATH)/bin/gosec" ./...

  # ─── Stage 3: Unit Tests ─────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests (All packages, excluding integration-tagged files)
        run: |
          # Go automatically ignores files with "//go:build integration" because -tags is not passed.
          go test -v -race -count=1 -timeout=300s \
            -coverprofile=unit.out \
            -covermode=atomic \
            $(go list ./... | grep -v /cmd/api | grep -v /internal/platform/db/sqlc | grep -v /testutil/mocks | grep -v /api)

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: unit.out

  # ─── Stage 4: Integration Tests (testcontainers-go) ──────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download Unit Coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage

      - name: Run integration tests (Requires Docker/Testcontainers)
        run: |
          go test -v -race -count=1 -timeout=120s \
            -tags=integration \
            -coverprofile=integration.out \
            -covermode=atomic \
            ./internal/platform/repository/...
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Enforce Combined Coverage Threshold (80%)
        run: |
          # go tool cover consolidates statistics from multiple .out files
          COVERAGE=$(go tool cover -func=unit.out -func=integration.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Combined Coverage: ${COVERAGE}%"
          awk "BEGIN { exit (${COVERAGE} < 80) }" || (echo "ERROR: Combined Coverage ${COVERAGE}% is below 80%" && exit 1)

      - name: Upload merged reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./unit.out,./integration.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: garnizeh/moolah

  # ─── Stage 5: Smoke Tests (Phase 1 end-to-end) ───────────────────────────
  smoke-tests:
    name: Phase 1 Smoke Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run Phase 1 smoke test (App Startup + Essential Flow)
        run: |
          go test -v -race -count=1 -timeout=300s \
            -tags=integration \
            -run TestSmoke_Phase1HappyPath \
            ./internal/server/...
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

  # ─── Stage 6: Build Artifacts & Binaries ─────────────────────────────────
  build-binaries:
    name: Build Binaries (API & Web)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install templ CLI
        run: go install github.com/a-h/templ/cmd/templ@${{ env.TEMPL_VERSION }}

      - name: Install Tailwind CSS CLI
        run: |
          curl -fsSL "https://github.com/tailwindlabs/tailwindcss/releases/download/v${{ env.TAILWIND_VERSION }}/tailwindcss-linux-x64" -o tailwindcss
          curl -fsSL "https://github.com/tailwindlabs/tailwindcss/releases/download/v${{ env.TAILWIND_VERSION }}/sha256sums.txt" -o sha256sums.txt
          grep "tailwindcss-linux-x64" sha256sums.txt | sha256sum -c -
          sudo mv tailwindcss /usr/local/bin/tailwindcss
          chmod +x /usr/local/bin/tailwindcss

      - name: Generate templates (templ)
        run: templ generate ./...

      - name: Build CSS (Tailwind)
        run: tailwindcss -i web/static/css/app.css -o web/static/css/app.min.css --minify

      - name: Build binaries (API & Web)
        run: make build

      - name: Lint generated code and handlers
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: --timeout=5m ./cmd/web/... ./cmd/api/... ./internal/ui/... ./web/...

  # ─── Stage 7: Build & Push Docker Image ─────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, smoke-tests, build-binaries, security]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 7: Automatic Release (release-please) ─────────────────────────
  release:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go