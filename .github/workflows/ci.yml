name: CI Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  TAILWIND_VERSION: "4.1.8"
  TEMPL_VERSION: "v0.3.1001"

jobs:
  # ─── Stage 1: Static Analysis ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: --timeout=5m

      - name: Install dependencies
        run: make deps

      - name: Check sqlc generation is up to date
        run: make sqlc-check

      - name: Install Tailwind CSS CLI
        run: make install-tailwind

      - name: Check templ generation is up to date
        run: make templ-check

      - name: Check swagger documentation is up to date
        run: make swagger-check

  # ─── Stage 2: Security Scanning ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run security checks
        run: make security-check

  # ─── Stage 3: Unit Tests ─────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (API/Logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests
        run: |
          make deps
          make test

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: unit-coverage
          path: unit.out

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run UI tests
        run: |
          make deps
          make test-ui

      - name: Upload UI coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-coverage
          path: ui.out

  # ─── Stage 4: Integration Tests ──────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, ui-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage

      - name: Download UI coverage
        uses: actions/download-artifact@v4
        with:
          name: ui-coverage

      - name: Run integration tests
        run: make test-integration

      - name: Enforce Combined Coverage Threshold (80%)
        run: make test-coverage

      - name: Upload merged reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./unit.out,./ui.out,./integration.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: garnizeh/moolah

  # ─── Stage 5: Smoke Tests ────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, ui-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run smoke tests
        run: make smoke-test

  # ─── Stage 6: Build Artifacts & Binaries ─────────────────────────────────
  build-binaries:
    name: Build Binaries (API & Web)
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, ui-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Tailwind CSS CLI
        run: make install-tailwind

      - name: Download dependencies
        run: make deps

      - name: Build binaries (API & Web)
        run: make build

  # ─── Stage 7: Build & Push Docker Image ─────────────────────────────────
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [integration-tests, smoke-tests, build-binaries]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 8: Automatic Release ──────────────────────────────────────────
  release:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go
