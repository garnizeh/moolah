name: CI

on:
  push:
    branches: [ main, "task/**" ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install Linting Tools
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/go/analysis/passes/fieldalignment/cmd/fieldalignment@latest
      - name: Run Gofumpt
        run: gofumpt -d . | tee /dev/stderr | (! grep -q .)
      - name: Run Fieldalignment
        run: fieldalignment ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run unit tests
        run: go test -v -race -cover ./...

  build:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Build API
        run: go build -v -o bin/api ./cmd/api
