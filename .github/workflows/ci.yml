name: CI Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  TAILWIND_VERSION: "4.1.8"
  TEMPL_VERSION: "v0.3.1001"

jobs:
  # ─── Stage 1: Static Analysis ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: --timeout=5m

      - name: Check sqlc generation is up to date
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          make sqlc-check

      - name: Install templ CLI
        run: go install github.com/a-h/templ/cmd/templ@${{ env.TEMPL_VERSION }}

      - name: Install Tailwind CSS CLI
        run: make install-tailwind

      - name: Check templ generation is up to date
        run: make templ-check

      - name: Check swagger documentation is up to date
        run: make swagger-check

  # ─── Stage 2: Security Scanning ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run security checks
        run: make security-check

  # ─── Stage 3: Unit Tests ─────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (API/Logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests
        run: make test

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: unit.out

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install templ CLI
        run: go install github.com/a-h/templ/cmd/templ@${{ env.TEMPL_VERSION }}

      - name: Run UI tests
        run: make test-ui

      - name: Upload UI coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: ui.out

  # ─── Stage 4: Integration Tests ──────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, ui-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage

      - name: Download UI coverage
        uses: actions/download-artifact@v4
        with:
          name: ui-coverage

      - name: Run integration tests
        run: make test-integration

      - name: Enforce Combined Coverage Threshold (80%)
        run: make test-coverage

      - name: Upload merged reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./unit.out,./ui.out,./integration.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: garnizeh/moolah

  # ─── Stage 5: Smoke Tests ────────────────────────────────────────────────
  smoke-tests:
    name: Phase 1 Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, ui-tests, integration-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run smoke tests
        run: make smoke-test
